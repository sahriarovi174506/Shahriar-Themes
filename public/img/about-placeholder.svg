<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Vector human placeholder</title>
  <desc id="desc">Abstract vector illustration of a human silhouette with soft gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#13213f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#bg)"/>

  <circle cx="640" cy="190" r="120" fill="#1e2f57" opacity="0.45"/>
  <circle cx="140" cy="820" r="160" fill="#13325d" opacity="0.45"/>

  <ellipse cx="400" cy="920" rx="200" ry="36" fill="#0a0f1a" opacity="0.6"/>

  <g transform="translate(400 470)">
    <circle cx="0" cy="-220" r="96" fill="#0f1a32"/>
    <path d="M-230 220c18-166 129-244 230-244s212 78 230 244v138H-230z" fill="#0f1a32"/>
    <circle cx="0" cy="-220" r="86" fill="#1a2b50"/>
    <path d="M-210 220c20-146 111-216 210-216s190 70 210 216v122H-210z" fill="#1a2b50"/>
  </g>

  <path d="M210 760c90 64 290 64 380 0" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.8"/>
  <circle cx="265" cy="748" r="8" fill="#22d3ee"/>
  <circle cx="535" cy="748" r="8" fill="#14b8a6"/>

  <circle cx="400" cy="250" r="130" fill="url(#glow)" opacity="0.18" filter="url(#soft)"/>
</svg>
